name: Update Blog Posts in README

on:
  schedule:
    - cron: "0 6 * * 1,5"   # Every Monday and Friday at 6 AM UTC
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest blog posts from waseemahmad.dev
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://waseemahmad.dev/rss.xml"
          max_post_count: 5
          readme_path: README.md
          comment_tag_name: BLOG-POST-LIST
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          commit_message: "chore: update latest blog posts"
